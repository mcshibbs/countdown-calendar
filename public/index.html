<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Countdown Calendar</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">SQLite countdowns</p>
          <h1>Countdown Calendar</h1>
        </div>
        <div class="header-actions">
          <a class="button button-ghost" href="/api/export">Export JSON</a>
          <a class="button button-primary" href="/api/export.db">Download DB</a>
        </div>
      </header>

      <section class="workspace" aria-label="Countdown calendar workspace">
        <form id="event-form" class="event-form">
          <div class="form-heading">
            <h2 id="form-title">Add event</h2>
            <button class="button button-ghost hidden" id="cancel-edit" type="button">Cancel</button>
          </div>

          <label>
            <span>Subject</span>
            <input id="title" name="title" autocomplete="off" maxlength="140" required>
          </label>

          <div class="form-row">
            <label>
              <span>Date</span>
              <input id="event-date" name="eventDate" type="date" required>
            </label>
            <fieldset class="segmented" aria-label="Recurrence">
              <legend>Repeats</legend>
              <label>
                <input type="radio" name="recurrence" value="none" checked>
                <span>Once</span>
              </label>
              <label>
                <input type="radio" name="recurrence" value="annual">
                <span>Yearly</span>
              </label>
            </fieldset>
          </div>

          <label>
            <span>Category</span>
            <input id="category-name" name="categoryName" list="category-options" autocomplete="off" required>
            <datalist id="category-options"></datalist>
          </label>

          <div class="form-row color-row">
            <label>
              <span>Color</span>
              <input id="category-color" name="categoryColor" type="color" value="#14b8a6">
            </label>
            <div id="color-state" class="color-state">New category</div>
          </div>

          <label>
            <span>Notes</span>
            <textarea id="notes" name="notes" rows="3" maxlength="500"></textarea>
          </label>

          <button class="button button-primary full-width" id="submit-button" type="submit">Add event</button>
          <p id="form-message" class="form-message" role="status"></p>
        </form>

        <section class="countdown-panel">
          <div class="panel-toolbar">
            <div>
              <p class="eyebrow">Upcoming</p>
              <h2>Next dates</h2>
            </div>
            <label class="range-control">
              <span>Range</span>
              <select id="range-days">
                <option value="90">90 days</option>
                <option value="180">6 months</option>
                <option value="365">1 year</option>
                <option value="730" selected>2 years</option>
                <option value="3650">10 years</option>
              </select>
            </label>
          </div>

          <div id="category-legend" class="category-legend" aria-label="Categories"></div>
          <div id="event-list" class="event-list" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
