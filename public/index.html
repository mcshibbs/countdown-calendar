<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Countdown Calendar</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Countdown Calendar</h1>
        <nav class="app-nav" aria-label="Primary navigation">
          <button class="nav-button is-active" type="button" data-view-target="home">Home</button>
          <button class="nav-button" type="button" data-view-target="add">Add Event</button>
          <button class="nav-button" type="button" data-view-target="settings">Settings</button>
        </nav>
      </header>

      <section id="home-view" class="view is-active" aria-label="Countdown calendar home">
        <section class="countdown-panel">
          <div class="panel-toolbar">
            <div>
              <p class="eyebrow">Upcoming</p>
              <h2>Next dates</h2>
            </div>
            <label class="range-control">
              <span>Range</span>
              <select id="range-days">
                <option value="90">90 days</option>
                <option value="180">6 months</option>
                <option value="365">1 year</option>
                <option value="730" selected>2 years</option>
                <option value="3650">10 years</option>
              </select>
            </label>
          </div>

          <div id="category-legend" class="category-legend" aria-label="Categories"></div>
          <div id="event-list" class="event-list" aria-live="polite"></div>
        </section>
      </section>

      <section id="add-view" class="view" aria-label="Add calendar event">
        <details id="event-editor" class="event-editor" open>
          <summary class="editor-summary">
            <span id="form-title">Add event</span>
            <span class="summary-hint">Toggle</span>
          </summary>

          <form id="event-form" class="event-form">
            <div class="form-heading">
              <p class="form-note">Manual entries can be one-time dates or yearly dates like birthdays and anniversaries.</p>
              <button class="button button-ghost hidden" id="cancel-edit" type="button">Cancel</button>
            </div>

            <label>
              <span>Subject</span>
              <input id="title" name="title" autocomplete="off" maxlength="140" required>
            </label>

            <div class="form-row">
              <label>
                <span>Date</span>
                <input id="event-date" name="eventDate" type="date" required>
              </label>
              <fieldset class="segmented" aria-label="Recurrence">
                <legend>Repeats</legend>
                <label>
                  <input type="radio" name="recurrence" value="none" checked>
                  <span>Once</span>
                </label>
                <label>
                  <input type="radio" name="recurrence" value="annual">
                  <span>Yearly</span>
                </label>
              </fieldset>
            </div>

            <label>
              <span>Category</span>
              <input id="category-name" name="categoryName" list="category-options" autocomplete="off" required>
              <datalist id="category-options"></datalist>
            </label>

            <div class="form-row color-row">
              <label>
                <span>Color</span>
                <input id="category-color" name="categoryColor" type="color" value="#14b8a6">
              </label>
              <div id="color-state" class="color-state">New category</div>
            </div>

            <label>
              <span>Notes</span>
              <textarea id="notes" name="notes" rows="3" maxlength="500"></textarea>
            </label>

            <button class="button button-primary full-width" id="submit-button" type="submit">Add event</button>
            <p id="form-message" class="form-message" role="status"></p>
          </form>
        </details>
      </section>

      <section id="settings-view" class="view" aria-label="Settings">
        <div class="settings-grid">
          <section class="settings-panel">
            <div class="panel-heading">
              <p class="eyebrow">Data</p>
              <h2>Export</h2>
            </div>
            <div class="action-grid">
              <a class="button button-ghost" href="/api/export">Export JSON</a>
              <a class="button button-primary" href="/api/export.db">Download DB</a>
            </div>
          </section>

          <section class="settings-panel">
            <div class="panel-heading">
              <p class="eyebrow">Bulk</p>
              <h2>Import</h2>
            </div>
            <form id="import-form" class="import-form">
              <div class="form-row">
                <label>
                  <span>File</span>
                  <input id="import-file" name="importFile" type="file" accept=".ics,.json,.csv,.txt,text/calendar,application/json,text/csv" required>
                </label>
                <label>
                  <span>Format</span>
                  <select id="import-format" name="importFormat">
                    <option value="auto" selected>Auto</option>
                    <option value="ics">ICS</option>
                    <option value="json">JSON</option>
                    <option value="csv">CSV</option>
                  </select>
                </label>
              </div>

              <label>
                <span>Import category</span>
                <input id="import-category-name" name="importCategoryName" list="category-options" autocomplete="off" value="Imported Events" required>
              </label>

              <div class="form-row color-row">
                <label>
                  <span>Color</span>
                  <input id="import-category-color" name="importCategoryColor" type="color" value="#2563eb">
                </label>
                <div id="import-color-state" class="color-state">New category</div>
              </div>

              <button class="button button-primary full-width" type="submit">Import events</button>
              <p id="import-message" class="form-message" role="status"></p>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
